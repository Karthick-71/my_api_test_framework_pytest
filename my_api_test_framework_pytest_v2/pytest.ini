[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: critical happy-path tests (run on every commit)
    regression: full regression suite (run nightly)
    slow: tests that take more than 5 seconds
    aws: tests that hit AWS S3 — requires AWS credentials
    parametrized: data-driven tests sourced from JSON / xlsx
    contract: schema/contract tests against OpenAPI spec
    negative: edge cases and failure-path validation

addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    -v
    --color=yes

# Treat warnings as errors so dependency deprecations surface in CI
filterwarnings =
    error
    ignore::DeprecationWarning:botocore.*
    ignore::DeprecationWarning:pytest_asyncio.*

# Console log level when -s is passed
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
